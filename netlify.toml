[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# Explicitly declare the Next.js runtime so App Router pages get compiled
# into Netlify Functions/Edge Functions. Without this the first deploy
# uploaded static HTML only and every dynamic route 404'd.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect www → apex (mirrors what next.config.ts does today — Netlify
# honors redirects() in next.config.ts via the runtime, but we also set a
# host-level redirect here as a belt-and-suspenders for edge cases where
# the runtime hasn't loaded yet).
[[redirects]]
  from = "https://www.gigwright.com/*"
  to = "https://gigwright.com/:splat"
  status = 307
  force = true
